services:
  api-service:
    container_name: APIService
    image: api-service
    build:
      context: .
      dockerfile: ./api-service/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-}
      - REDIS_USERNAME=${REDIS_USERNAME:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REQUEST_STREAM=${REQUEST_STREAM:-openai:requests}
      - RESPONSE_STREAM_PREFIX=${RESPONSE_STREAM_PREFIX:-openai:responses}
      - RESPONSE_TTL_SEC=${RESPONSE_TTL_SEC:-300}
      - REQUEST_GROUP=${REQUEST_GROUP:-api-service}
      - CONSUMER_NAME=${CONSUMER_NAME:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RETRY_ATTEMPTS=${RETRY_ATTEMPTS:-5}
      - RETRY_BASE_SEC=${RETRY_BASE_SEC:-0.5}
      - RETRY_CAP_SEC=${RETRY_CAP_SEC:-8}
    restart: always
